name: bostrainer
description: BOSTrainer - BOS Radio Communication Training App

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  http: ^1.2.0
  provider: ^6.1.0
  record: ^6.2.0
  just_audio: ^0.10.5
  path_provider: ^2.1.2
  path: ^1.9.0
  sherpa_onnx: ^1.10.0
  vosk_flutter_service: ^0.1.1
  speech_to_text: ^7.0.0
  permission_handler: ^12.0.1
  shared_preferences: ^2.2.2
  flutter_tts: ^4.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/
